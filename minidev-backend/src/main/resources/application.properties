spring.application.name=MiniDev


# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Wallpaper Configuration
minidev.wallpaper.cron=0 0 0 * * *


# LLM Configuration (OpenRouter)
minidev.llm.openrouterApiKey=${OPENROUTER_API_KEY:}
minidev.llm.model=openrouter/auto
minidev.llm.baseUrl=https://openrouter.ai/api/v1/

# MiniDev Storage
minidev.storage.base-path=generated-games

# Session & Cookie Security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m
