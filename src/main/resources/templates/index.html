<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName}">MiniDev</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script th:src="@{/js/index.js}" defer></script>
</head>
<body>
<main class="page-shell">
    <section class="window-frame">
        <div class="title-bar" th:text="${appName} + '.exe'">MiniDev.exe</div>

        <div class="window-body">
            <div class="content-grid">
                <div class="content-main">
                    <span class="view-label" th:text="${viewTitle}">Initial View</span>
                    <h1 th:text="${appName}">MiniDev</h1>
                    <p class="tagline" th:text="${tagline}">Tiny autonomous game developer</p>
                    <p class="copy">
                        A small landing page that serves as a style sample. No real app logic yet,
                        just layout, typography, and a first UI direction.
                    </p>

                    <div class="action-row">
                        <button type="button" class="action-button">Start</button>
                        <button type="button" class="action-button">Build</button>
                        <button type="button" class="action-button">Inspect</button>
                    </div>
                </div>

                <div class="content-side">
                    <div class="side-panel">
                        <div class="panel-title">LLM Test</div>
                        <div class="screen">
                            <div id="chat-output">
                                <div>&gt; MiniDev booting...</div>
                                <div>&gt; theme loaded</div>
                                <div>&gt; ready</div>
                            </div>
                            <form id="chat-form" style="margin-top: 10px;">
                                <input type="text" id="message-input" placeholder="Type a message..." style="width: 100%; padding: 5px; font-family: monospace; background: #000; color: #0f0; border: 1px solid #0f0;">
                                <button type="submit" style="margin-top: 5px; width: 100%; padding: 5px; font-family: monospace; background: #0f0; color: #000; border: none; cursor: pointer;">Send</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span>THYMELEAF + LOCAL CSS</span>
            <span>INITIAL VIEW</span>
        </div>
    </section>

    <div id="notification-banner" class="notification-banner" style="display: none;">
        <div id="notification-container" class="notification-container">
            <!-- Items like <span class="notification-item"><span class="notification-label">...</span><span class="notification-text">...</span></span> -->
        </div>
    </div>
</main>
</body>
</html>
