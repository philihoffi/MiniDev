<div class="gallery-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="header-title">
        <h3>Wallpapers</h3>
        <span class="count-badge" *ngIf="wallpapers().length > 0">{{ wallpapers().length }}</span>
      </div>
      <button class="btn-generate" (click)="generateNew()" [disabled]="isGenerating()">
        <svg *ngIf="!isGenerating()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        <svg *ngIf="isGenerating()" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ isGenerating() ? 'Generating...' : 'New' }}</span>
      </button>
    </div>

    <div class="list-container">
      <ul class="wallpaper-list" *ngIf="wallpapers().length > 0">
        <li *ngFor="let wp of wallpapers()"
            [class.active]="selectedWallpaper()?.id === wp.id"
            (click)="selectWallpaper(wp)">
          <div class="wp-item-content">
            <div class="wp-info">
              <span class="wp-theme">{{ wp.theme }}</span>
              <span class="wp-id">#{{ wp.id }}</span>
            </div>
            <button class="btn-delete-item" (click)="deleteWallpaper(wp, $event)" title="Delete Wallpaper">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>
          </div>
        </li>
      </ul>

      <div *ngIf="wallpapers().length === 0" class="empty-state">
        <i class="icon-empty"></i>
        <p>No wallpapers found.</p>
      </div>
    </div>
  </aside>

  <!-- Preview -->
  <main class="preview-area">
    <div *ngIf="selectedWallpaper(); else noSelection" class="preview-container">
      <header class="preview-header">
        <div class="header-info">
          <h2>{{ selectedWallpaper()?.theme }}</h2>
        </div>
        <div class="header-actions">
          <span class="status-badge">Live Preview</span>
        </div>
      </header>
      <div class="iframe-wrapper">
        <iframe #previewFrame class="wallpaper-iframe" [srcdoc]="safeCode()"></iframe>
      </div>
    </div>

    <ng-template #noSelection>
      <div class="no-selection-state">
        <div class="state-content">
          <div class="placeholder-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-16 h-16 opacity-20">
              <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
            </svg>
          </div>
          <h3>Selection Required</h3>
          <p>Choose a wallpaper from the gallery to view the animation.</p>
        </div>
      </div>
    </ng-template>
  </main>
</div>
