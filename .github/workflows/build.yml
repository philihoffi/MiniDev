name: Build and Test Full Project

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: minidev-frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: minidev-frontend

    - name: Build Frontend
      run: npm run build
      working-directory: minidev-frontend

    - name: Upload Frontend Build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: minidev-backend/src/main/resources/static/browser/

  backend:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download Frontend Build
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: minidev-backend/src/main/resources/static/browser/

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Make Maven Wrapper Executable
      run: chmod +x mvnw
      working-directory: minidev-backend

    - name: Build Backend with Maven
      run: ./mvnw clean install -T 1C -DskipTests -DskipFrontendBuild=true
      working-directory: minidev-backend

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: minidev-application
        path: minidev-backend/target/*.war
