spring.application.name=MiniDev

# Thymeleaf defaults for local development
spring.thymeleaf.cache=false

# LLM Configuration (OpenRouter)
minidev.llm.openrouterApiKey=${OPENROUTER_API_KEY:}
minidev.llm.model=google/gemini-3-flash-preview
minidev.llm.baseUrl=https://openrouter.ai/api/v1/chat/completions

# MiniDev Storage
minidev.storage.base-path=generated-games
